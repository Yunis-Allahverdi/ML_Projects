<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baku House Price Estimation</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    margin:0;
    padding:0;

    /* background image */
    background: url("C:\Programming Files\Python_Files\Python Tutorials\Flask_house_tst\ML_Projects\baku_house_price_prediction\images\baku_img.jpeg") no-repeat center center fixed;
    background-size: cover;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* form container */
.container{

    width:500px;
    padding:35px;

    background: rgba(255,255,255,0.92);

    border-radius:12px;

    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* title */
h1{
    text-align:center;
    margin-bottom:25px;
    color:#1c2c4c;
}

/* labels */
label{
    font-weight:bold;
    display:block;
    margin-top:15px;
}

/* inputs + selects */
input, select{

    width:100%;
    padding:12px;
    margin-top:6px;

    border-radius:6px;
    border:1px solid #ccc;

    font-size:15px;

    box-sizing:border-box; /* THIS FIXES ALIGNMENT */
}

/* button */
button{

    width:100%;
    padding:14px;

    margin-top:25px;

    background:#1877f2;

    color:white;

    font-size:16px;

    border:none;
    border-radius:6px;

    cursor:pointer;
}

button:hover{
    background:#0f5ec7;
}

/* prediction result */
.result{

    margin-top:20px;

    text-align:center;

    font-size:20px;

    color:#1e7e34;

    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Baku House Price Estimation</h1>

<form method="POST">

<label>Category</label>
<select name="category">
<option value="1">Yeni</option>
<option value="0">Kohne</option>
</select>


<label>Area (m²)</label>
<input type="number" name="area" required>


<label>Room Number</label>
<input type="number" name="room_number" required>


<label>Repair</label>
<select name="repair">
<option value="1">Var</option>
<option value="0">Yoxdur</option>
</select>


<label>Title Deed</label>
<select name="title_deed">
<option value="1">Var</option>
<option value="0">Yoxdur</option>
</select>


<label>Region</label>
<select name="region">

<option value="Absheron">Absheron</option>
<option value="Bineqedi">Bineqedi</option>
<option value="Nerimanov">Nerimanov</option>
<option value="Nesimi">Nesimi</option>
<option value="Nizami">Nizami</option>
<option value="Sabunchu">Sabunchu</option>
<option value="Sebail">Sebail</option>
<option value="Suraxani">Suraxani</option>
<option value="Xetai">Xetai</option>
<option value="Xezer">Xezer</option>
<option value="Yasamal">Yasamal</option>

</select>


<button type="submit">Predict Price</button>

</form>

{% if predicted_price %}

<div class="result">

Predicted Price: {{ predicted_price }}

</div>

{% endif %}

</div>

</body>
</html>
